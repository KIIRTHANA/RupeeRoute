<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rupee Route - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card glass">
      <div class="auth-header">
        <div class="logo">&#8377;</div>
        <h1>Rupee Route</h1>
        <p class="subtitle">See where every rupee goes.</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Sign Up</button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="auth-form">
        <div class="field">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <div id="login-error" class="auth-error"></div>
        <button type="submit" class="btn-primary">
          Sign In
        </button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="auth-form" style="display: none;">
        <div class="field">
          <label for="reg-display">Display Name</label>
          <input type="text" id="reg-display" placeholder="What should we call you?" autocomplete="name">
        </div>
        <div class="field">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="Choose a username" required autocomplete="username" minlength="3">
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Create a password" required autocomplete="new-password" minlength="4">
        </div>
        <div id="register-error" class="auth-error"></div>
        <button type="submit" class="btn-primary">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll(".auth-tab");
    const loginForm = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        if (tab.dataset.tab === "login") {
          loginForm.style.display = "block";
          registerForm.style.display = "none";
        } else {
          loginForm.style.display = "none";
          registerForm.style.display = "block";
        }
        document.getElementById("login-error").textContent = "";
        document.getElementById("register-error").textContent = "";
      });
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-error");
      errEl.textContent = "";

      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("login-username").value,
          password: document.getElementById("login-password").value,
        }),
      });

      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error;
        return;
      }
      window.location.href = "/";
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("register-error");
      errEl.textContent = "";

      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          display_name: document.getElementById("reg-display").value,
          username: document.getElementById("reg-username").value,
          password: document.getElementById("reg-password").value,
        }),
      });

      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error;
        return;
      }
      window.location.href = "/";
    });
  </script>
</body>
</html>
