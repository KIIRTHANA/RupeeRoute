<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rupee Route</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app">
    <div class="user-bar">
      <span class="user-greeting">Hello, <strong id="user-name">...</strong></span>
      <button class="btn-logout" id="logout-btn">Logout</button>
    </div>

    <header>
      <div class="logo">&#8377;</div>
      <h1>Rupee Route</h1>
      <p class="subtitle">See where every rupee goes.</p>
    </header>

    <!-- Stats strip -->
    <div class="stats-strip">
      <div class="stat-card">
        <div class="stat-icon" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">&#8377;</div>
        <div class="stat-info">
          <span class="stat-label">Total Spent</span>
          <strong class="stat-value" id="total-amount">&#8377;0.00</strong>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b, #ef4444);">#</div>
        <div class="stat-info">
          <span class="stat-label">Transactions</span>
          <strong class="stat-value" id="total-count">0</strong>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: linear-gradient(135deg, #10b981, #059669);">~</div>
        <div class="stat-info">
          <span class="stat-label">Avg / Expense</span>
          <strong class="stat-value" id="avg-amount">&#8377;0.00</strong>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">&uarr;</div>
        <div class="stat-info">
          <span class="stat-label">Highest</span>
          <strong class="stat-value" id="top-expense">&#8377;0.00</strong>
        </div>
      </div>
    </div>

    <div class="layout">
      <!-- Left column -->
      <aside class="sidebar">
        <section class="card glass add-expense">
          <h2>Add Expense</h2>
          <form id="expense-form">
            <div class="field">
              <label for="amount">Amount</label>
              <div class="input-prefix">
                <span>&#8377;</span>
                <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required>
              </div>
            </div>
            <div class="field">
              <label for="category">Category</label>
              <select id="category" required>
                <option value="">Select category</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label for="description">Description</label>
              <input type="text" id="description" placeholder="What was this for?" maxlength="200">
            </div>
            <div class="field">
              <label for="date">Date</label>
              <input type="date" id="date">
            </div>
            <button type="submit" class="btn-primary">
              <span class="btn-icon">+</span> Add Expense
            </button>
          </form>
        </section>

        <!-- Donut chart -->
        <section class="card glass chart-card">
          <h2>Spending by Category</h2>
          <div class="chart-container">
            <canvas id="category-chart"></canvas>
            <div class="chart-center" id="chart-center">
              <span class="chart-center-label">Total</span>
              <strong class="chart-center-value" id="chart-center-value">&#8377;0</strong>
            </div>
          </div>
          <div id="chart-legend" class="chart-legend"></div>
        </section>
      </aside>

      <!-- Right column -->
      <main class="content">
        <section class="card glass filters">
          <h2>Filters</h2>
          <div class="filter-row">
            <div class="field">
              <label for="filter-category">Category</label>
              <select id="filter-category">
                <option value="">All categories</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label for="filter-start">From</label>
              <input type="date" id="filter-start">
            </div>
            <div class="field">
              <label for="filter-end">To</label>
              <input type="date" id="filter-end">
            </div>
            <button class="btn-secondary" id="clear-filters">Clear</button>
          </div>
        </section>

        <section class="card glass">
          <div class="card-header">
            <h2>Recent Expenses</h2>
            <span class="badge" id="expense-badge">0</span>
          </div>
          <div id="expense-list" class="expense-list">
            <div class="empty-state">
              <div class="empty-icon">&#128176;</div>
              <p>No expenses yet</p>
              <span>Add your first expense to start tracking!</span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
